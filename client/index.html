<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muralish Clinton — Solutions Architect & Fractional CTO</title>
    <meta name="description" content="Muralish Clinton is a Solutions Architect and Fractional CTO building cloud-native platforms, AI-native engineering organisations, and Internal Developer Portals at scale." />
    <meta property="og:title" content="Muralish Clinton — Solutions Architect & Fractional CTO" />
    <meta property="og:description" content="Building the future of platform engineering — teams, platforms, and AI-native systems from the ground up." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fonts load asynchronously so they never block first paint -->
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    >
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    </noscript>
  <script>
    // Restore path saved by 404.html (GitHub Pages SPA deep-link fix).
    // Runs before React mounts so wouter reads the correct pathname.
    (function () {
      var p = sessionStorage.getItem('spa_redirect');
      if (p) {
        sessionStorage.removeItem('spa_redirect');
        window.history.replaceState(null, '', p);
      }
    })();
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
