<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authentz — Engineering Playbook</title>
<style>
/* ── Reset ────────────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#eef2f7;color:#1a2332;font-size:13.5px;line-height:1.5}

/* ── Tokens ───────────────────────────────────────────────────────────────── */
:root{
  --hh:0px; /* header height — set by JS */
  --surface:#fff;
  --bg:#eef2f7;
  --border:#dce5ef;
  --text-1:#1a2332;
  --text-2:#4a5870;
  --text-3:#8fa0b5;
  --blue:#2563eb;
  --green:#16a34a;
  --radius:10px;
  --radius-sm:6px;
  --shadow:0 1px 3px rgba(15,25,50,.07),0 3px 10px rgba(15,25,50,.05);
  --shadow-hover:0 4px 20px rgba(15,25,50,.1),0 1px 4px rgba(15,25,50,.06);
}

/* ── Header ───────────────────────────────────────────────────────────────── */
#hdr{background:#0d1624;color:#fff;padding:14px 24px 12px;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 12px rgba(0,0,0,.25)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
h1{font-size:16px;font-weight:700;letter-spacing:-.3px;color:#e8edf5}
.btn-print{background:#2563eb;color:#fff;border:none;padding:5px 14px;border-radius:var(--radius-sm);
  font-size:11.5px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-print:hover{background:#1d4ed8}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.arr{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#8fa0b5;
  width:28px;height:28px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.arr:hover:not(:disabled){background:rgba(255,255,255,.15);color:#fff}
.arr:disabled{opacity:.2;cursor:default}
.wtabs{display:flex;background:rgba(255,255,255,.07);border-radius:var(--radius-sm);padding:3px;gap:2px}
.wt{background:none;border:none;color:#8fa0b5;padding:4px 16px;border-radius:5px;
  font-size:11.5px;font-weight:600;cursor:pointer;transition:all .15s}
.wt:hover:not(.on){color:#e2e8f0}
.wt.on{background:#2563eb;color:#fff}
#wtitle{font-size:11px;color:#556070;margin-left:6px}
.prog-row{display:flex;align-items:center;gap:10px}
.prog-bar{flex:1;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#22c55e;width:0%;transition:width .4s;border-radius:2px}
#ptxt{font-size:11px;color:#556070;white-space:nowrap}

/* ── Page layout — 3 columns ─────────────────────────────────────────────── */
.layout{display:grid;grid-template-columns:210px 1fr 270px;gap:16px;
  padding:18px 20px;align-items:start;min-height:calc(100vh - var(--hh))}

/* ── Sticky sidebars ──────────────────────────────────────────────────────── */
.lsb,.rsb{position:sticky;top:calc(var(--hh) + 16px);
  max-height:calc(100vh - var(--hh) - 32px);overflow-y:auto;
  display:flex;flex-direction:column;gap:10px;
  /* hide scrollbar */
  scrollbar-width:none}
.lsb::-webkit-scrollbar,.rsb::-webkit-scrollbar{display:none}

/* ── Cards grid ───────────────────────────────────────────────────────────── */
.days{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.wide{grid-column:1/-1}
.wide .card-body{columns:3;column-gap:20px}

/* ── Card ─────────────────────────────────────────────────────────────────── */
.card{background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow);border:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:var(--shadow-hover);transform:translateY(-1px)}
.card-hdr{padding:11px 14px 9px;display:flex;align-items:center;gap:9px;
  border-bottom:1px solid var(--border)}
.fnum{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;
  justify-content:center;font-size:10.5px;font-weight:800;color:#fff;flex-shrink:0}
.ftheme{font-size:13px;font-weight:700;color:var(--text-1);flex:1;line-height:1.2}
.fpct{font-size:10px;font-weight:700;color:var(--text-3);min-width:24px;text-align:right}
.fpct.done{color:var(--green)}
.card-body{padding:10px 14px 6px;flex:1}
.task{display:flex;align-items:flex-start;gap:8px;padding:5px 0;
  border-bottom:1px solid #f4f7fb;cursor:pointer}
.task:last-child{border-bottom:none}
.task input[type=checkbox]{
  appearance:none;-webkit-appearance:none;width:14px;height:14px;flex-shrink:0;
  border:1.5px solid #c5d0dc;border-radius:3px;cursor:pointer;margin-top:2px;
  transition:all .15s;background:#fff}
.task input[type=checkbox]:checked{
  background:#2563eb;border-color:#2563eb;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 14 14' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2.5 7l3 3 6-5.5' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-size:10px;background-repeat:no-repeat;background-position:center}
.task label{font-size:12px;color:var(--text-2);line-height:1.45;cursor:pointer;transition:color .15s}
.task.done label{color:#b0bec5;text-decoration:line-through;text-decoration-color:#dce5ef}
.cpbar{height:3px;background:#f0f4f8;margin-top:auto}
.cpfill{height:100%;transition:width .3s}

/* Accent colours — top border + badge + progress */
.f1{border-top:3px solid #2563eb}.f1 .fnum{background:#2563eb}.f1 .cpfill{background:#2563eb}
.f2{border-top:3px solid #059669}.f2 .fnum{background:#059669}.f2 .cpfill{background:#059669}
.f3{border-top:3px solid #d97706}.f3 .fnum{background:#d97706}.f3 .cpfill{background:#d97706}
.f4{border-top:3px solid #7c3aed}.f4 .fnum{background:#7c3aed}.f4 .cpfill{background:#7c3aed}
.f5{border-top:3px solid #dc2626}.f5 .fnum{background:#dc2626}.f5 .cpfill{background:#dc2626}
.f6{border-top:3px solid #0891b2}.f6 .fnum{background:#0891b2}.f6 .cpfill{background:#0891b2}
.f7{border-top:3px solid #1e293b}.f7 .fnum{background:#1e293b}.f7 .cpfill{background:#1e293b}

/* ── Left sidebar — Priorities + Remember ────────────────────────────────── */
.sq{background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.sq-hdr{padding:9px 13px;font-size:10px;font-weight:800;text-transform:uppercase;
  letter-spacing:.7px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px}
.sq-body{padding:6px 13px 10px}

/* Priorities */
.sq.pri .sq-hdr{background:#0d1624;color:#64748b}
.pi{display:flex;align-items:flex-start;gap:7px;padding:5px 0;
  border-bottom:1px solid #f4f7fb;font-size:12px;color:var(--text-2);line-height:1.4}
.pi:last-child{border-bottom:none}
.pn{width:18px;height:18px;border-radius:4px;background:#2563eb;color:#fff;
  font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.badge-sm{font-size:9.5px;font-weight:700;padding:1px 7px;border-radius:10px;
  background:#fef3c7;color:#92400e;margin-left:4px}

/* Remember */
.sq.rem .sq-hdr{background:#fafbfc;color:#8fa0b5}
.rem-item{display:flex;align-items:flex-start;gap:7px;padding:5px 0;
  border-bottom:1px solid #f4f7fb;font-size:12px;color:var(--text-2);line-height:1.4}
.rem-item:last-child{border-bottom:none}
.rem-dot{width:6px;height:6px;border-radius:50%;background:#94a3b8;flex-shrink:0;margin-top:5px}

/* ── Right sidebar — Questions with thought bubbles ──────────────────────── */
.qgroup{background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.qg-hdr{padding:9px 13px;font-size:10.5px;font-weight:700;
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
.qg-icon{width:28px;height:28px;flex-shrink:0;opacity:.85}
.qg-body{padding:8px 12px 10px;display:flex;flex-direction:column;gap:6px;
  max-height:220px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#dce5ef transparent}
.qg-body::-webkit-scrollbar{width:4px}
.qg-body::-webkit-scrollbar-track{background:transparent}
.qg-body::-webkit-scrollbar-thumb{background:#dce5ef;border-radius:2px}

/* Thought bubble question items */
.qi{background:#f4f8ff;border:1px solid #dbeafe;border-radius:10px 10px 10px 3px;
  padding:7px 10px;font-size:11.5px;color:#1e40af;line-height:1.5;
  word-break:break-word;overflow-wrap:break-word}
/* alternate colors per group */
.qg-fnd .qi{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
.qg-ind .qi{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
.qg-ops .qi{background:#f4f8ff;border-color:#dbeafe;color:#1e40af}
.qg-eng .qi{background:#f4f8ff;border-color:#dbeafe;color:#1e40af}
.qg-fnd2 .qi{background:#f0fdf4;border-color:#bbf7d0;color:#166534}

/* Header accent per group */
.qg-fnd .qg-hdr{background:#f0fdf4;color:#166534;border-bottom-color:#bbf7d0}
.qg-ind .qg-hdr{background:#fff7ed;color:#9a3412;border-bottom-color:#fed7aa}
.qg-ops .qg-hdr{background:#eff6ff;color:#1d4ed8;border-bottom-color:#bfdbfe}
.qg-eng .qg-hdr{background:#eff6ff;color:#1d4ed8;border-bottom-color:#bfdbfe}
.qg-fnd2 .qg-hdr{background:#f0fdf4;color:#166534;border-bottom-color:#bbf7d0}

/* Thinking person SVG */
.think-svg{color:inherit}

/* ── Week divider (All view) ──────────────────────────────────────────────── */
.wdiv{grid-column:1/-1;display:flex;align-items:center;gap:10px;padding:2px 0 6px}
.wd-pill{background:#0d1624;color:#fff;font-size:9.5px;font-weight:800;
  text-transform:uppercase;letter-spacing:.8px;padding:3px 10px;border-radius:20px;flex-shrink:0}
.wd-line{flex:1;height:1px;background:var(--border)}
.wd-info{font-size:11.5px;color:var(--text-2);font-weight:600;flex-shrink:0}
.wd-p{font-size:11px;color:var(--text-3)}

/* ── All-view sidebar stats ───────────────────────────────────────────────── */
.srow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f4f7fb}
.srow:last-child{border-bottom:none}
.slabel{font-size:12px;color:var(--text-2);flex:1}
.sbar{width:64px;height:5px;background:#eef2f7;border-radius:3px;overflow:hidden;flex-shrink:0}
.sfill{height:100%;background:#22c55e;border-radius:3px}
.sval{font-size:11px;color:var(--text-3);white-space:nowrap;min-width:48px;text-align:right}

.reset-btn{width:100%;background:none;border:1px solid var(--border);color:var(--text-3);
  padding:5px 8px;border-radius:var(--radius-sm);font-size:11px;cursor:pointer;
  margin-top:8px;transition:all .15s}
.reset-btn:hover{border-color:#c0cad6;color:var(--text-2)}

/* ── Context chip ─────────────────────────────────────────────────────────── */
.ctx-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:4px 10px 4px 8px;
  cursor:pointer;transition:all .15s;flex-shrink:0}
.ctx-chip:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.22)}
.ctx-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}
.ctx-product{font-size:11.5px;font-weight:700;color:#e2e8f0}
.ctx-sep{color:#475569;font-size:10px}
.ctx-role{font-size:11px;color:#94a3b8}
.ctx-edit{color:#556070;font-size:10px;margin-left:2px}

/* ── Config modal ─────────────────────────────────────────────────────────── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;
  align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);animation:mfade .15s ease}
@keyframes mfade{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal h3{font-size:15px;font-weight:700;color:#0f172a;margin-bottom:4px}
.modal p{font-size:12px;color:#64748b;margin-bottom:18px}
.mfield{margin-bottom:14px}
.mfield label{display:block;font-size:11px;font-weight:700;color:#475569;
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.mfield input,.mfield select{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;
  padding:8px 11px;font-size:13px;color:#0f172a;outline:none;transition:border .15s;
  font-family:inherit}
.mfield input:focus,.mfield select:focus{border-color:#2563eb}
.mfield select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='%2364748b' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M4 6l4 4 4-4'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 10px center;background-size:14px;
  padding-right:32px}
.mbtn-row{display:flex;gap:8px;margin-top:20px}
.mbtn{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.mbtn.primary{background:#2563eb;color:#fff}.mbtn.primary:hover{background:#1d4ed8}
.mbtn.sec{background:#f1f5f9;color:#475569}.mbtn.sec:hover{background:#e2e8f0}
.product-hint{font-size:11px;color:#94a3b8;margin-top:4px}

/* ── Tablet (768–1023px) ──────────────────────────────────────────────────── */
@media(max-width:1023px){
  .layout{grid-template-columns:200px 1fr;gap:12px;padding:14px 16px}
  .rsb{display:none} /* questions move below on tablet */
  .days{grid-template-columns:repeat(2,1fr);gap:10px}
  .wide .card-body{columns:2;column-gap:14px}
}

/* ── Mobile (≤767px — iPhone) ────────────────────────────────────────────── */
@media(max-width:767px){
  /* Header */
  #hdr{padding:10px 14px 8px}
  .hdr-top{margin-bottom:6px}
  h1{font-size:14px}
  .ctx-role,.ctx-sep{display:none} /* keep only product name on small screens */
  .ctx-chip{padding:3px 8px 3px 6px;gap:5px}
  .ctx-dot{width:6px;height:6px}
  .btn-print{padding:4px 10px;font-size:11px}

  /* Week nav — horizontally scrollable */
  .week-nav{gap:6px;margin-bottom:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;
    padding-bottom:2px;scrollbar-width:none}
  .week-nav::-webkit-scrollbar{display:none}
  .wtabs{flex-shrink:0}
  .wt{padding:4px 12px;font-size:11px}
  #wtitle{display:none}
  .arr{width:26px;height:26px;font-size:12px;flex-shrink:0}
  #ptxt{font-size:10px}

  /* Layout: single column, cards first */
  .layout{display:flex;flex-direction:column;gap:12px;padding:12px;min-height:auto}
  main{order:1}
  .lsb{order:2;position:static;max-height:none;flex-direction:row;flex-wrap:wrap;gap:8px}
  .rsb{order:3;position:static;max-height:none;display:flex;flex-direction:column;gap:8px}
  .lsb .sq,.rsb .qgroup{flex:1 1 280px} /* fill row, wrap to next on very small */

  /* Cards: single column */
  .days{grid-template-columns:1fr;gap:8px}
  .wide .card-body{columns:1}

  /* Card content — bigger touch targets */
  .card-hdr{padding:10px 12px 8px}
  .card-body{padding:8px 12px 6px}
  .task{padding:8px 0;gap:10px}
  .task input[type=checkbox]{width:18px;height:18px;margin-top:1px;border-radius:4px}
  .task label{font-size:13px}
  .ftheme{font-size:13.5px}
  .fnum{width:24px;height:24px}

  /* Questions: show all, no scroll cap */
  .qg-body{max-height:none;overflow-y:visible}

  /* Week divider */
  .wdiv{gap:7px}
  .wd-info{font-size:11px}

  /* Sidebar panels: compact */
  .sq-hdr{padding:8px 12px;font-size:9px}
  .sq-body{padding:5px 12px 8px}
  .pi,.rem-item{font-size:12.5px;padding:5px 0}
  .pi,.rem-item{padding:6px 0}

  /* Modal: full-width on mobile */
  .modal{width:calc(100vw - 32px);padding:20px}
}

/* ── Very small screens (≤374px — iPhone SE) ─────────────────────────────── */
@media(max-width:374px){
  .lsb{flex-direction:column}
  .lsb .sq{flex:1 1 100%}
}

/* ── Print ────────────────────────────────────────────────────────────────── */
@media print{
  body{background:#fff}
  #hdr{position:static}
  .btn-print,.arr,.reset-btn,.ctx-chip{display:none}
  .modal-bg{display:none!important}
  .layout{grid-template-columns:1fr;padding:8px}
  .lsb,.rsb{position:static;max-height:none;display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .days{grid-template-columns:repeat(3,1fr)}
  *{box-shadow:none!important;transform:none!important}
  .qg-body{max-height:none;overflow-y:visible}
}
</style>
</head>
<body>

<!-- Config modal -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>Workspace Context</h3>
    <p>Set the product and role for this playbook. This is saved locally.</p>
    <div class="mfield">
      <label>Product / Company</label>
      <select id="cfg-product" onchange="updateRoleOptions()">
        <option value="Authentz">Authentz</option>
        <option value="custom">Other (enter below)</option>
      </select>
    </div>
    <div class="mfield" id="custom-product-wrap" style="display:none">
      <label>Custom Product / Company Name</label>
      <input id="cfg-custom" type="text" placeholder="e.g. Acme Corp">
    </div>
    <div class="mfield">
      <label>Your Role</label>
      <select id="cfg-role">
        <option value="Head of Engineering">Head of Engineering</option>
        <option value="CTO">CTO</option>
        <option value="VP Engineering">VP Engineering</option>
        <option value="Tech Lead">Tech Lead</option>
        <option value="Solutions Architect">Solutions Architect</option>
        <option value="custom-role">Other (enter below)</option>
      </select>
    </div>
    <div class="mfield" id="custom-role-wrap" style="display:none">
      <label>Custom Role</label>
      <input id="cfg-custom-role" type="text" placeholder="e.g. Principal Engineer">
    </div>
    <div class="mbtn-row">
      <button class="mbtn sec" onclick="closeModal()">Cancel</button>
      <button class="mbtn primary" onclick="saveCtx()">Save Context</button>
    </div>
  </div>
</div>

<header id="hdr">
  <div class="hdr-top">
    <h1 id="hdr-title">Engineering Playbook</h1>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="ctx-chip" onclick="openModal()" title="Change context">
        <div class="ctx-dot"></div>
        <span class="ctx-product" id="ctx-product">Authentz</span>
        <span class="ctx-sep">•</span>
        <span class="ctx-role" id="ctx-role">Head of Engineering</span>
        <span class="ctx-edit">✎</span>
      </div>
      <button class="btn-print" onclick="window.print()">Print</button>
    </div>
  </div>
  <div class="week-nav">
    <button class="arr" id="bp" onclick="go(-1)">&#8592;</button>
    <div class="wtabs" id="wt"></div>
    <button class="arr" id="bn" onclick="go(1)">&#8594;</button>
    <span id="wtitle"></span>
  </div>
  <div class="prog-row">
    <div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
    <div id="ptxt"></div>
  </div>
</header>

<div class="layout">
  <aside class="lsb" id="lsb"></aside>
  <main><div class="days" id="main"></div></main>
  <aside class="rsb" id="rsb"></aside>
</div>

<script>
/* ── Thinking person SVG (inline, reusable) ─────────────────────────────── */
function thinkSVG(color){
  return`<svg class="qg-icon think-svg" viewBox="0 0 40 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="12" cy="22" r="5" fill="${color}" opacity=".75"/>
  <path d="M4 35c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="${color}" stroke-width="2" stroke-linecap="round"/>
  <circle cx="23" cy="15" r="1.8" fill="${color}" opacity=".4"/>
  <circle cx="27" cy="10" r="2.4" fill="${color}" opacity=".35"/>
  <circle cx="32" cy="6" r="3" fill="${color}" opacity=".3"/>
  <text x="29.5" y="8.5" font-size="5" font-weight="900" fill="${color}" text-anchor="middle" opacity=".7">?</text>
</svg>`;
}

/* ── DATA ─────────────────────────────────────────────────────────────────── */
const WEEKS=[
{
  id:'w1',label:'Week 1',title:'Onboarding & Discovery',
  focuses:[
    {n:1,theme:'Orient & Access',wide:false,tasks:[
      'Meet founders — understand their vision for the Head of Engineering role and success criteria',
      'Get all access: corporate email, GitHub/GitLab, Azure portal, Slack or Teams',
      'First call with India team lead — listen only, don\'t push for changes yet',
      'Set up dev environment: Java 21, Maven/Gradle, Cursor IDE, Azure CLI, git',
      'Review your own onboarding notes and briefing documents before the day starts'
    ]},

/* ── State & storage ──────────────────────────────────────────────────────── */
const ALL=WEEKS.length;
let view=0;
const SK='authentz-play-v4';
const st=()=>{try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch{return{}}};
const key=(wid,fn,ti)=>`${wid}-f${fn}-t${ti}`;
const isOn=k=>!!st()[k];
const setOn=(k,v)=>{const s=st();s[k]=v;localStorage.setItem(SK,JSON.stringify(s))};

function wProg(w){const s=st();let d=0,t=0;
  w.focuses.forEach(f=>f.tasks.forEach((_,i)=>{t++;if(s[key(w.id,f.n,i)])d++;}));
  return{d,t,p:t?Math.round(d/t*100):0}}
function fProg(wid,f){const s=st();
  const d=f.tasks.filter((_,i)=>s[key(wid,f.n,i)]).length;
  return{d,t:f.tasks.length,p:Math.round(d/f.tasks.length*100)}}

/* ── Card HTML ────────────────────────────────────────────────────────────── */
function cardHTML(wid,f){
  const p=fProg(wid,f);
  const pLabel=p.d>0?(p.p===100?'✓':p.p+'%'):'';
  const tasks=f.tasks.map((t,i)=>{
    const k=key(wid,f.n,i),on=isOn(k);
    return`<div class="task${on?' done':''}"><input type="checkbox" id="${k}"${on?' checked':''}><label for="${k}">${t}</label></div>`;
  }).join('');
  return`<div class="card f${f.n}${f.wide?' wide':''}">
  <div class="card-hdr"><div class="fnum">${f.n}</div><div class="ftheme">${f.theme}</div><div class="fpct${p.p===100?' done':''}">${pLabel}</div></div>
  <div class="card-body">${tasks}</div>
  <div class="cpbar"><div class="cpfill" style="width:${p.p}%"></div></div>
</div>`;
}

/* ── Left sidebar ─────────────────────────────────────────────────────────── */
function lsbHTML(w){
  const badge=w.priorities.badge?`<span class="badge-sm">${w.priorities.badge}</span>`:'';
  const pris=w.priorities.items.map((x,i)=>`<div class="pi"><span class="pn">${i+1}</span>${x}</div>`).join('');
  const rem=w.remember.map(x=>`<div class="rem-item"><div class="rem-dot"></div>${x}</div>`).join('');
  return`<div class="sq pri">
    <div class="sq-hdr">${w.priorities.title}${badge}</div>
    <div class="sq-body">${pris}</div>
  </div>
  <div class="sq rem">
    <div class="sq-hdr">Remember</div>
    <div class="sq-body">${rem}</div>
    <div style="padding:0 13px 10px"><button class="reset-btn" onclick="resetW('${w.id}')">Reset ${w.label}</button></div>
  </div>`;
}

function lsbAllHTML(){
  const rows=WEEKS.map(w=>{const p=wProg(w);return`<div class="srow">
    <div class="slabel"><strong>${w.label}</strong><br><span style="font-size:10.5px;color:var(--text-3)">${w.title}</span></div>
    <div class="sbar"><div class="sfill" style="width:${p.p}%"></div></div>
    <div class="sval">${p.d}/${p.t}<br>${p.p}%</div></div>`;}).join('');
  const td=WEEKS.reduce((a,w)=>a+wProg(w).d,0);
  const ta=WEEKS.reduce((a,w)=>a+wProg(w).t,0);
  const tp=ta?Math.round(td/ta*100):0;
  return`<div class="sq pri">
    <div class="sq-hdr">Overall Progress</div>
    <div class="sq-body">${rows}
      <div class="srow" style="margin-top:6px;border-top:2px solid var(--border);padding-top:8px">
        <div class="slabel" style="font-weight:700;color:var(--text-1)">Total</div>
        <div class="sbar"><div class="sfill" style="width:${tp}%;background:#2563eb"></div></div>
        <div class="sval" style="font-weight:700;color:var(--text-1)">${td}/${ta}<br>${tp}%</div>
      </div>
    </div>
    <div style="padding:0 13px 10px"><button class="reset-btn" onclick="resetAll()">Reset all</button></div>
  </div>`;
}

/* ── Right sidebar — thought bubble questions ─────────────────────────────── */
function qGroupHTML(g){
  const qs=g.items.map(q=>`<div class="qi">${q}</div>`).join('');
  return`<div class="qgroup ${g.cls}">
  <div class="qg-hdr">${thinkSVG(g.color)}<span>Questions for ${g.title}</span></div>
  <div class="qg-body">${qs}</div>
</div>`;
}
function rsbHTML(w){return w.questions.map(qGroupHTML).join('')}
function rsbAllHTML(){return WEEKS.flatMap(w=>w.questions).map(qGroupHTML).join('')}

/* ── Render ───────────────────────────────────────────────────────────────── */
function render(){
  const main=document.getElementById('main');
  const lsb=document.getElementById('lsb');
  const rsb=document.getElementById('rsb');

  if(view===ALL){
    document.getElementById('wtitle').textContent='All weeks — complete overview';
    let html='';
    WEEKS.forEach(w=>{
      const p=wProg(w);
      html+=`<div class="wdiv">
        <span class="wd-pill">${w.label}</span>
        <div class="wd-line"></div>
        <span class="wd-info">${w.title}</span>
        <div class="wd-line"></div>
        <span class="wd-p">${p.d}/${p.t} &middot; ${p.p}%</span>
      </div>`;
      html+=w.focuses.map(f=>cardHTML(w.id,f)).join('');
    });
    main.innerHTML=html;
    lsb.innerHTML=lsbAllHTML();
    rsb.innerHTML=rsbAllHTML();
    const td=WEEKS.reduce((a,w)=>a+wProg(w).d,0);
    const ta=WEEKS.reduce((a,w)=>a+wProg(w).t,0);
    document.getElementById('pf').style.width=(ta?Math.round(td/ta*100):0)+'%';
    document.getElementById('ptxt').textContent=`${td} / ${ta} total tasks`;
  } else {
    const w=WEEKS[view];
    document.getElementById('wtitle').textContent=w.title;
    main.innerHTML=w.focuses.map(f=>cardHTML(w.id,f)).join('');
    lsb.innerHTML=lsbHTML(w);
    rsb.innerHTML=rsbHTML(w);
    const p=wProg(w);
    document.getElementById('pf').style.width=p.p+'%';
    document.getElementById('ptxt').textContent=`${p.d} / ${p.t} tasks · ${p.p}% complete`;
  }

  document.getElementById('wt').innerHTML=
    WEEKS.map((w,i)=>`<button class="wt${view===i?' on':''}" onclick="sv(${i})">${w.label}</button>`).join('')+
    `<button class="wt${view===ALL?' on':''}" onclick="sv(${ALL})">All</button>`;
  document.getElementById('bp').disabled=(view===0);
  document.getElementById('bn').disabled=(view===ALL);

  document.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change',()=>{
      cb.closest('.task').classList.toggle('done',cb.checked);
      setOn(cb.id,cb.checked);render();
    });
  });
}

function sv(v){view=v;render();window.scrollTo(0,0)}
function go(d){const nv=view+d;if(nv>=0&&nv<=ALL)sv(nv)}
function resetW(wid){
  if(!confirm('Reset '+wid.replace('w','Week ')+'?'))return;
  const s=st();Object.keys(s).filter(k=>k.startsWith(wid+'-')).forEach(k=>delete s[k]);
  localStorage.setItem(SK,JSON.stringify(s));render();
}
function resetAll(){
  if(!confirm('Reset ALL checkboxes?'))return;
  localStorage.removeItem(SK);render();
}

document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;
  if(e.key==='ArrowLeft')go(-1);if(e.key==='ArrowRight')go(1);
});

/* ── Context switcher ─────────────────────────────────────────────────────── */
const CTX_KEY='authentz-ctx-v1';
const KNOWN_PRODUCTS=['Authentz'];
const KNOWN_ROLES=['Head of Engineering','CTO','VP Engineering','Tech Lead','Solutions Architect'];

function loadCtx(){
  try{return JSON.parse(localStorage.getItem(CTX_KEY)||'{}')}catch{return{}}
}
function applyCtx(){
  const c=loadCtx();
  const product=c.product||'Authentz';
  const role=c.role||'Head of Engineering';
  document.getElementById('ctx-product').textContent=product;
  document.getElementById('ctx-role').textContent=role;
  document.getElementById('hdr-title').textContent=`${product} — Engineering Playbook`;
  document.title=`${product} — Engineering Playbook`;
}
function openModal(){
  const c=loadCtx();
  const product=c.product||'Authentz';
  const role=c.role||'Head of Engineering';
  const ps=document.getElementById('cfg-product');
  const rs=document.getElementById('cfg-role');
  if(KNOWN_PRODUCTS.includes(product)){ps.value=product;}
  else{ps.value='custom';document.getElementById('cfg-custom').value=product;}
  if(KNOWN_ROLES.includes(role)){rs.value=role;}
  else{rs.value='custom-role';document.getElementById('cfg-custom-role').value=role;}
  updateRoleOptions();
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open')}
function updateRoleOptions(){
  const isCustomP=document.getElementById('cfg-product').value==='custom';
  document.getElementById('custom-product-wrap').style.display=isCustomP?'block':'none';
  const isCustomR=document.getElementById('cfg-role').value==='custom-role';
  document.getElementById('custom-role-wrap').style.display=isCustomR?'block':'none';
}
document.getElementById('cfg-role').addEventListener('change',updateRoleOptions);
function saveCtx(){
  const ps=document.getElementById('cfg-product').value;
  const rs=document.getElementById('cfg-role').value;
  const product=ps==='custom'?(document.getElementById('cfg-custom').value.trim()||'Authentz'):ps;
  const role=rs==='custom-role'?(document.getElementById('cfg-custom-role').value.trim()||'Head of Engineering'):rs;
  localStorage.setItem(CTX_KEY,JSON.stringify({product,role}));
  applyCtx();
  closeModal();
}

/* Set header height CSS variable for sticky sidebars */
function setHH(){
  document.documentElement.style.setProperty('--hh',document.getElementById('hdr').offsetHeight+'px');
}
window.addEventListener('resize',setHH);

applyCtx();
render();
setHH();
</script>
